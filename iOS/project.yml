name: BetterBob-iOS
options:
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "2.15"
targets:
  BetterBob:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
      # Shared code from the Mac app — this list grows as files gain
      # platform guards. Only files listed here are compiled for iOS.
      - path: ../Sources
        includes:
          - "Models/**"
          - "Services/AttendanceLogic.swift"
          - "Services/BobParsing.swift"
          - "Services/BobClient.swift"
          - "Services/Keychain.swift"
          - "UI/Motion.swift"
          - "UI/WindowVisibility.swift"
          - "UI/Components.swift"
          - "UI/PillControls.swift"
          - "UI/BobMascot.swift"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: k3n.betterbob.ios
        INFOPLIST_FILE: Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: false
