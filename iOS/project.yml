name: BetterBob-iOS
options:
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "2.15"
targets:
  BetterBob:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
      - path: Sources/Shared
      # Shared code from the Mac app — this list grows as files gain
      # platform guards. Only files listed here are compiled for iOS.
      - path: ../Sources
        includes:
          - "Models/**"
          - "Services/AttendanceLogic.swift"
          - "Services/BobParsing.swift"
          - "Services/BobClient.swift"
          - "Services/Keychain.swift"
          - "UI/Motion.swift"
          - "UI/WindowVisibility.swift"
          - "UI/Components.swift"
          - "UI/PillControls.swift"
          - "UI/BobMascot.swift"
          - "Features/Settings/SSOSignIn.swift"
          - "Services/Prefs.swift"
          - "Services/Notifier.swift"
          - "Services/BobState.swift"
          - "Intents/BobIntents.swift"
          - "Features/Dashboard/DashboardView.swift"
          - "Features/Dashboard/DashboardSections.swift"
          - "Features/Dashboard/TodayVariants.swift"
          - "Features/Dashboard/EditableDayStrip.swift"
          - "Features/Dashboard/TimeOffPane.swift"
          - "Features/Onboarding/Onboarding.swift"
          - "Features/Settings/SettingsPanel.swift"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: k3n.betterbob.ios
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/BetterBob.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - target: BetterBobWidgets
        embed: true
  BetterBobWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/Widgets
      - path: Sources/Shared
      - path: ../Sources/Models/WidgetSnapshot.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: k3n.betterbob.ios.widgets
        INFOPLIST_FILE: Resources/Widgets-Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Widgets.entitlements
        GENERATE_INFOPLIST_FILE: false
        SKIP_INSTALL: true
