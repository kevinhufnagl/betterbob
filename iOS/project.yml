name: BetterBob-iOS
options:
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    # Free signing: leave DEVELOPMENT_TEAM blank — Xcode fills in the
    # Personal Team you pick in Signing & Capabilities on first open.
    DEVELOPMENT_TEAM: ""
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "2.15"
packages:
  BetterBobShared:
    path: ../Packages/BetterBobShared
targets:
  BetterBob:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
      - path: Sources/Common
      - path: Sources/Screens
      - path: Sources/Shared
      # App Intents must compile into the app target itself so Shortcuts
      # metadata extraction sees them; the file is shared with the Mac build.
      - path: ../Sources/Intents/BobIntents.swift
      - path: Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: k3n.betterbob.ios
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/BetterBob.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: BetterBobShared
      - target: BetterBobWidgets
        embed: true
  BetterBobWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/Widgets
      - path: Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: k3n.betterbob.ios.widgets
        INFOPLIST_FILE: Resources/Widgets-Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Widgets.entitlements
        GENERATE_INFOPLIST_FILE: false
        SKIP_INSTALL: true
    dependencies:
      - package: BetterBobShared
